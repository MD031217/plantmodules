<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">

    <div class="theme-switcher" id="themeSwitcher">
        <img src="тема.png" alt="Переключить тему" class="theme-icon-img">
    </div>

    <div class="wrapper">
        <img src="Тёмная.png" alt="Зеленая полка" class="brand-logo logo-light">
        <img src="Светлая.png" alt="Зеленая полка" class="brand-logo logo-dark">
        <div class="auth-card">
            <h1>Авторизация</h1>
            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <input type="text" name="login" placeholder="Логин" required autocomplete="username">
                </div>
                
                <div class="form-group password-group">
                    <input type="password" name="password" id="passwordInput" placeholder="Пароль" required autocomplete="current-password">
                    <img src="Открытый.png" alt="Показать пароль" class="toggle-password" id="togglePassword">
                </div>

                <div class="register-link">
                    Нет аккаунта? <a href="register.html">Зарегистрируйся!</a>
                </div>

                <button type="submit" class="btn">Вход</button>
            </form>
        </div>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.classList.remove('theme-dark', 'theme-light');
            document.body.classList.add(savedTheme);
        }
        document.getElementById('themeSwitcher').addEventListener('click', function() {
            const isDark = document.body.classList.contains('theme-dark');
            document.body.classList.remove('theme-dark', 'theme-light');
            document.body.classList.add(isDark ? 'theme-light' : 'theme-dark');
            localStorage.setItem('theme', isDark ? 'theme-light' : 'theme-dark');
        });
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');

        togglePassword.addEventListener('click', function() {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            this.src = isPassword ? 'Закрытый.png' : 'Открытый.png';
            this.alt = isPassword ? 'Скрыть пароль' : 'Показать пароль';
        });
    </script>
</body>
</html>
